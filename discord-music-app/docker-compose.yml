services:
  music-bot:
    build: .
    container_name: discord-music-bot
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - discord-music-bot-data:/app/data # Persist SQLite database
      # - ./cookies.txt:/app/cookies.txt:ro  # Uncomment if using YouTube cookies
    env_file:
      - .env
    healthcheck:
      test:
        ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  discord-music-bot-data:
