<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wave.</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d0d0f;
  --surface: #141418;
  --surface2: #1c1c22;
  --surface3: #242430;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --accent: #e8c87a;
  --accent-dim: rgba(232,200,122,0.1);
  --text: #f0ede8;
  --text-muted: #5a5668;
  --text-sub: #8e8a9a;
  --danger: #e87a7a;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  height: 100vh;
  overflow: hidden;
}

#app {
  display: grid;
  grid-template-columns: 220px 1fr 300px;
  grid-template-rows: 1fr 72px;
  height: 100vh;
}

/* ── Toast ── */
#toast-container {
  position: fixed; bottom: 88px; left: 50%; transform: translateX(-50%);
  z-index: 200; display: flex; flex-direction: column; gap: 8px; pointer-events: none;
}
.toast {
  background: var(--surface3); border: 1px solid var(--border2);
  border-radius: 8px; padding: 10px 16px; font-size: 13px; color: var(--text);
  animation: toastIn 0.2s ease, toastOut 0.3s ease 2.7s forwards; white-space: nowrap;
}
.toast.error { border-color: var(--danger); color: var(--danger); }
@keyframes toastIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
@keyframes toastOut { to { opacity:0; transform:translateY(-6px); } }

/* ── Sidebar ── */
.sidebar {
  grid-row: 1/2; background: var(--surface); border-right: 1px solid var(--border);
  padding: 24px 16px; display: flex; flex-direction: column; gap: 24px; overflow-y: auto;
}
.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--surface3); }

.logo { font-family: 'Instrument Serif', serif; font-size: 22px; letter-spacing: -0.3px; padding: 0 8px; }
.logo span { color: var(--accent); }

.nav { display: flex; flex-direction: column; gap: 2px; }
.nav-item {
  display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 8px;
  color: var(--text-sub); cursor: pointer; transition: all 0.12s; font-weight: 400; user-select: none;
}
.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active { background: var(--accent-dim); color: var(--accent); }
.nav-item svg { flex-shrink: 0; }

.sidebar-label {
  font-size: 10px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase;
  color: var(--text-muted); padding: 0 10px; margin-bottom: 4px;
}
.sidebar-section { display: flex; flex-direction: column; }

.pl-sidebar-item {
  display: flex; align-items: center; gap: 9px; padding: 7px 10px;
  border-radius: 8px; cursor: pointer; transition: background 0.12s;
}
.pl-sidebar-item:hover { background: var(--surface2); }
.pl-thumb {
  width: 30px; height: 30px; border-radius: 6px; flex-shrink: 0;
  background: var(--surface3); display: flex; align-items: center; justify-content: center;
  font-size: 13px; overflow: hidden;
}
.pl-name { font-size: 12px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pl-count { font-size: 11px; color: var(--text-muted); }

.user-area {
  margin-top: auto; display: flex; align-items: center; gap: 10px;
  padding: 10px; background: var(--surface2); border-radius: 10px; border: 1px solid var(--border);
}
.user-avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; overflow: hidden; background: var(--surface3); }
.user-avatar img { width: 100%; height: 100%; object-fit: cover; }
.user-name { font-size: 12px; font-weight: 500; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.btn-logout { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; border-radius: 6px; transition: color 0.12s; }
.btn-logout:hover { color: var(--danger); }

/* ── Center / Discovery ── */
.main {
  grid-row: 1/2; display: flex; flex-direction: column;
  overflow: hidden; padding: 28px 32px 0; gap: 20px;
}

.hero { display: flex; flex-direction: column; gap: 14px; flex-shrink: 0; }
.hero-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
.hero-heading { font-family: 'Instrument Serif', serif; font-size: 32px; line-height: 1.1; letter-spacing: -0.4px; }
.hero-heading em { font-style: italic; color: var(--accent); }

.btn {
  display: flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 8px;
  font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.12s;
  border: none; font-family: 'DM Sans', sans-serif;
}
.btn-primary { background: var(--accent); color: #0d0d0f; }
.btn-primary:hover { filter: brightness(1.08); }
.btn-ghost { background: var(--surface2); color: var(--text-sub); border: 1px solid var(--border); }
.btn-ghost:hover { color: var(--text); border-color: var(--border2); }

.search-wrap { position: relative; }
.search-input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 13px 44px; font-family: 'DM Sans', sans-serif;
  font-size: 14px; color: var(--text); outline: none; transition: border-color 0.2s;
}
.search-input::placeholder { color: var(--text-muted); }
.search-input:focus { border-color: rgba(232,200,122,0.35); }
.search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }
.search-spinner {
  position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
  width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.7s linear infinite; display: none;
}
.search-spinner.active { display: block; }
@keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }

.content-area { flex: 1; overflow: hidden; display: flex; flex-direction: column; min-height: 0; padding-bottom: 20px; }

.section-hdr { display: flex; align-items: center; justify-content: space-between; padding: 4px 0 12px; flex-shrink: 0; }
.section-title { font-size: 11px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-sub); }

#center-content { flex: 1; overflow-y: auto; }
#center-content::-webkit-scrollbar { width: 3px; }
#center-content::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }

/* Result rows (search + history) */
.result-item {
  display: flex; align-items: center; gap: 12px;
  padding: 9px 10px; border-radius: 9px; cursor: pointer; transition: background 0.1s;
}
.result-item:hover { background: var(--surface2); }
.result-thumb { width: 48px; height: 36px; border-radius: 5px; flex-shrink: 0; overflow: hidden; background: var(--surface3); }
.result-thumb img { width: 100%; height: 100%; object-fit: cover; }
.result-info { flex: 1; min-width: 0; }
.result-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.result-channel { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.result-dur { font-size: 11px; color: var(--text-muted); flex-shrink: 0; }
.result-add {
  background: var(--accent-dim); border: 1px solid rgba(232,200,122,0.2); color: var(--accent);
  border-radius: 6px; padding: 5px 10px; font-size: 11px; font-weight: 600;
  cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.12s; white-space: nowrap;
}
.result-add:hover { background: rgba(232,200,122,0.18); }

/* Playlist grid */
.pl-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 14px; padding: 2px; }
.pl-card {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
  padding: 14px; cursor: pointer; transition: all 0.15s; display: flex; flex-direction: column; gap: 10px;
}
.pl-card:hover { border-color: var(--border2); background: var(--surface3); }
.pl-card-art {
  width: 100%; aspect-ratio: 1; border-radius: 7px; background: var(--surface3);
  display: flex; align-items: center; justify-content: center; font-size: 32px;
}
.pl-card-name { font-size: 13px; font-weight: 500; }
.pl-card-count { font-size: 11px; color: var(--text-muted); }
.pl-card-new {
  border-style: dashed; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 8px;
  color: var(--text-muted); min-height: 140px;
}
.pl-card-new:hover { color: var(--accent); border-color: rgba(232,200,122,0.3); background: var(--accent-dim); }

/* Default browse grid */
.default-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.default-card {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
  padding: 16px; cursor: pointer; transition: all 0.12s; display: flex; align-items: center; gap: 12px;
}
.default-card:hover { border-color: var(--border2); background: var(--surface3); }
.default-card-icon { font-size: 22px; flex-shrink: 0; }
.default-card-label { font-size: 13px; font-weight: 500; }
.default-card-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

.empty-state { padding: 40px 20px; text-align: center; color: var(--text-muted); font-size: 13px; line-height: 1.7; }

/* Eq bars */
.eq { display: inline-flex; align-items: flex-end; gap: 2px; height: 12px; vertical-align: middle; }
.eq-b { width: 2.5px; background: var(--accent); border-radius: 2px; animation: eq 0.8s ease-in-out infinite alternate; }
.eq-b:nth-child(1) { height: 5px; animation-delay: 0s; }
.eq-b:nth-child(2) { height: 10px; animation-delay: 0.2s; }
.eq-b:nth-child(3) { height: 7px; animation-delay: 0.1s; }
.eq-b:nth-child(4) { height: 12px; animation-delay: 0.3s; }
@keyframes eq { from { transform: scaleY(0.3); } to { transform: scaleY(1); } }

/* ── Now Playing Panel ── */
.np-panel {
  grid-row: 1/2; background: var(--surface); border-left: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}

.np-inner { padding: 22px 20px 14px; display: flex; flex-direction: column; gap: 12px; flex-shrink: 0; }
.np-label { font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); }
.np-art { width: 100%; aspect-ratio: 1; border-radius: 10px; overflow: hidden; background: var(--surface2); position: relative; }
.np-art img { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.3s; }
.np-art-placeholder { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 48px; color: var(--text-muted); }
.np-meta { display: flex; flex-direction: column; gap: 2px; }
.np-title { font-family: 'Instrument Serif', serif; font-size: 17px; line-height: 1.25; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.np-artist { font-size: 12px; color: var(--text-muted); }

.np-progress { padding: 0 20px; flex-shrink: 0; }
.progress-track { width: 100%; height: 3px; background: var(--surface2); border-radius: 3px; position: relative; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 3px; width: 0%; }
.progress-fill::after { content:''; position:absolute; right:-4px; top:-3px; width:9px; height:9px; background:var(--accent); border-radius:50%; opacity:0; transition:opacity 0.15s; }
.np-progress:hover .progress-fill::after { opacity: 1; }
.progress-times { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-muted); margin-top: 6px; }

.np-controls { display: flex; align-items: center; justify-content: space-between; padding: 2px 20px 0; flex-shrink: 0; }

.ctrl { background: none; border: none; color: var(--text-sub); cursor: pointer; padding: 7px; border-radius: 8px; transition: all 0.12s; display: flex; align-items: center; justify-content: center; }
.ctrl:hover { color: var(--text); background: var(--surface2); }
.ctrl.play { background: var(--accent); color: #0d0d0f; width: 40px; height: 40px; border-radius: 50%; padding: 0; }
.ctrl.play:hover { filter: brightness(1.1); }
.ctrl.active { color: var(--accent); }
.ctrl:disabled { opacity: 0.3; cursor: not-allowed; }

/* ── Full Queue (right panel) ── */
.queue-section {
  flex: 1; overflow: hidden; border-top: 1px solid var(--border);
  display: flex; flex-direction: column; min-height: 0;
}
.queue-header { display: flex; align-items: center; justify-content: space-between; padding: 11px 20px 9px; flex-shrink: 0; }
.queue-label { font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); }
.queue-actions { display: flex; gap: 10px; }
.queue-action { background: none; border: none; font-size: 11px; color: var(--text-muted); cursor: pointer; font-family: 'DM Sans', sans-serif; transition: color 0.12s; padding: 0; }
.queue-action:hover { color: var(--accent); }
.queue-action.danger:hover { color: var(--danger); }

.queue-list { flex: 1; overflow-y: auto; padding: 0 10px 12px; }
.queue-list::-webkit-scrollbar { width: 3px; }
.queue-list::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }

.q-item { display: flex; align-items: center; gap: 9px; padding: 6px 8px; border-radius: 7px; transition: background 0.1s; }
.q-item:hover { background: var(--surface2); }
.q-item.now-playing { background: var(--accent-dim); }
.q-art { width: 36px; height: 36px; border-radius: 5px; overflow: hidden; background: var(--surface3); flex-shrink: 0; }
.q-art img { width: 100%; height: 100%; object-fit: cover; }
.q-info { flex: 1; min-width: 0; }
.q-title { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.q-item.now-playing .q-title { color: var(--accent); }
.q-artist { font-size: 10px; color: var(--text-muted); }
.q-dur { font-size: 10px; color: var(--text-muted); flex-shrink: 0; }
.q-remove { background: none; border: none; color: transparent; cursor: pointer; padding: 3px; border-radius: 4px; flex-shrink: 0; transition: all 0.12s; display: flex; }
.q-item:hover .q-remove { color: var(--text-muted); }
.q-remove:hover { color: var(--danger) !important; background: rgba(232,122,122,0.1); }

/* ── Bottom Bar ── */
.bottom-bar {
  grid-column: 1/-1; grid-row: 2/3; background: var(--surface); border-top: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 20px; gap: 12px; height: 72px;
}
.bb-track { display: flex; align-items: center; gap: 10px; width: 200px; flex-shrink: 0; }
.bb-art { width: 40px; height: 40px; border-radius: 7px; overflow: hidden; background: var(--surface3); flex-shrink: 0; }
.bb-art img { width: 100%; height: 100%; object-fit: cover; }
.bb-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bb-artist { font-size: 11px; color: var(--text-muted); }
.bb-center { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 7px; }
.bb-controls { display: flex; align-items: center; gap: 2px; }
.bb-prog-track { width: 100%; max-width: 400px; height: 2px; background: var(--surface2); border-radius: 2px; }
.bb-prog-fill { height: 100%; width: 0%; background: var(--text-sub); border-radius: 2px; }

/* ── Modal ── */
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 80; display: none; align-items: center; justify-content: center; }
.modal-bg.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border2); border-radius: 14px; padding: 28px; width: 380px; display: flex; flex-direction: column; gap: 14px; }
.modal-title { font-family: 'Instrument Serif', serif; font-size: 20px; }
.modal-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); outline: none; transition: border-color 0.2s; }
.modal-input:focus { border-color: rgba(232,200,122,0.35); }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
</style>
</head>
<body>
<div id="toast-container"></div>

<div id="app">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="logo">wave<span>.</span></div>
    <nav class="nav">
      <div class="nav-item active" data-view="search">
        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        Search
      </div>
      <div class="nav-item" data-view="playlists">
        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Playlists
      </div>
      <div class="nav-item" data-view="history">
        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        History
      </div>
    </nav>
    <div class="sidebar-section">
      <div class="sidebar-label">My Playlists</div>
      <div id="playlist-sidebar-list"></div>
    </div>
    <div class="user-area">
      <div class="user-avatar"><img id="user-avatar-img" src="" alt="" style="opacity:0;"></div>
      <div class="user-name" id="user-name-text">Kasper</div>
      <button class="btn-logout" onclick="logout()" title="Sign out">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </aside>

  <!-- ── Center / Discovery ── -->
  <main class="main">
    <div class="hero">
      <div class="hero-row">
        <div class="hero-heading" id="hero-heading">Good evening,<br><em>Kasper.</em></div>
      </div>
      <div class="search-wrap">
        <svg class="search-icon" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="search-input" class="search-input" type="text" placeholder="Search YouTube — type to find any song…">
        <div id="search-spinner" class="search-spinner"></div>
      </div>
    </div>
    <div class="content-area">
      <div class="section-hdr">
        <span class="section-title" id="section-title">BROWSE</span>
      </div>
      <div id="center-content"></div>
    </div>
  </main>

  <!-- ── Now Playing + Full Queue ── -->
  <aside class="np-panel">
    <div class="np-inner">
      <div class="np-label">Now Playing</div>
      <div class="np-art">
        <img id="np-art-img" src="" alt="" style="opacity:0;">
        <div class="np-art-placeholder" id="np-art-placeholder">♪</div>
      </div>
      <div class="np-meta">
        <div class="np-title" id="np-title">Nothing playing</div>
        <div class="np-artist" id="np-artist">—</div>
      </div>
    </div>
    <div class="np-progress">
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="progress-times">
        <span id="prog-current">0:00</span>
        <span id="prog-total">0:00</span>
      </div>
    </div>
    <div class="np-controls">
      <button class="ctrl" id="ctrl-loop" onclick="playerAction('loop')" title="Loop">
        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>
      </button>
      <button class="ctrl" disabled title="Previous">
        <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2"/></svg>
      </button>
      <button class="ctrl play" onclick="togglePlayPause()">
        <svg id="play-icon" width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        <svg id="pause-icon" width="18" height="18" fill="currentColor" viewBox="0 0 24 24" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      </button>
      <button class="ctrl" onclick="playerAction('skip')" title="Skip">
        <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2"/></svg>
      </button>
      <button class="ctrl" onclick="playerAction('stop')" title="Stop">
        <svg width="15" height="15" fill="currentColor" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
      </button>
    </div>

    <!-- Full queue — single source of truth, no duplication -->
    <div class="queue-section">
      <div class="queue-header">
        <span class="queue-label">Up Next</span>
        <div class="queue-actions">
          <button class="queue-action" onclick="shuffleQueue()">Shuffle</button>
          <button class="queue-action danger" onclick="clearQueue()">Clear</button>
        </div>
      </div>
      <div class="queue-list" id="queue-list"></div>
    </div>
  </aside>

  <!-- ── Bottom Bar ── -->
  <div class="bottom-bar">
    <div class="bb-track">
      <div class="bb-art"><img id="bb-art-img" src="" alt="" style="opacity:0;"></div>
      <div>
        <div class="bb-title" id="bb-title">—</div>
        <div class="bb-artist" id="bb-artist">Not playing</div>
      </div>
    </div>
    <div class="bb-center">
      <div class="bb-controls">
        <button class="ctrl" disabled>
          <svg width="17" height="17" fill="currentColor" viewBox="0 0 24 24"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2"/></svg>
        </button>
        <button class="ctrl play" style="width:34px;height:34px;" onclick="togglePlayPause()">
          <svg width="15" height="15" fill="currentColor" viewBox="0 0 24 24" id="bb-play-icon"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          <svg width="15" height="15" fill="currentColor" viewBox="0 0 24 24" id="bb-pause-icon" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        </button>
        <button class="ctrl" onclick="playerAction('skip')">
          <svg width="17" height="17" fill="currentColor" viewBox="0 0 24 24"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2"/></svg>
        </button>
      </div>
      <div class="bb-prog-track"><div class="bb-prog-fill" id="bb-prog-fill"></div></div>
    </div>
  </div>
</div>

<!-- New Playlist Modal -->
<div class="modal-bg" id="playlist-modal">
  <div class="modal">
    <div class="modal-title">New Playlist</div>
    <input class="modal-input" id="pl-name-input" placeholder="Playlist name" type="text">
    <input class="modal-input" id="pl-spotify-input" placeholder="Spotify playlist URL (optional)" type="text">
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closePlaylistModal()">Cancel</button>
      <button class="btn btn-primary" onclick="createPlaylist()">Create</button>
    </div>
  </div>
</div>

<script>
// ── Sample Data ────────────────────────────────────────────────────
const CHIP_COLORS = ['#e8c87a','#9b7fe8','#7ec87a','#e87a7a','#7ac4e8','#e8a87a'];

const SAMPLE_QUEUE = {
  current: { title:'Midnight City', channel:'M83', duration:243, thumbnail:'https://i.ytimg.com/vi/dX3k_QDnzHE/mqdefault.jpg' },
  tracks: [
    { title:'Dreams', channel:'Fleetwood Mac', duration:254, thumbnail:'https://i.ytimg.com/vi/mrZRURcb1cM/mqdefault.jpg' },
    { title:'Electric Feel', channel:'MGMT', duration:229, thumbnail:'https://i.ytimg.com/vi/MmZexg8sxyk/mqdefault.jpg' },
    { title:'Cruel Summer', channel:'Bananarama', duration:219, thumbnail:'https://i.ytimg.com/vi/4bCWbMGqSgA/mqdefault.jpg' },
    { title:'Take On Me', channel:'a-ha', duration:227, thumbnail:'https://i.ytimg.com/vi/djV11Xbc914/mqdefault.jpg' },
    { title:'Running Up That Hill', channel:'Kate Bush', duration:302, thumbnail:'https://i.ytimg.com/vi/wp43OdtAAkM/mqdefault.jpg' },
    { title:'Africa', channel:'Toto', duration:295, thumbnail:'https://i.ytimg.com/vi/FTQbiNvZqaY/mqdefault.jpg' },
  ]
};

const SAMPLE_HISTORY = [
  { title:'Africa', channel:'Toto', duration:295, thumbnail:'https://i.ytimg.com/vi/FTQbiNvZqaY/mqdefault.jpg' },
  { title:'Running Up That Hill', channel:'Kate Bush', duration:302, thumbnail:'https://i.ytimg.com/vi/wp43OdtAAkM/mqdefault.jpg' },
  { title:'Take On Me', channel:'a-ha', duration:227, thumbnail:'https://i.ytimg.com/vi/djV11Xbc914/mqdefault.jpg' },
  { title:'Cruel Summer', channel:'Bananarama', duration:219, thumbnail:'https://i.ytimg.com/vi/4bCWbMGqSgA/mqdefault.jpg' },
  { title:'Electric Feel', channel:'MGMT', duration:229, thumbnail:'https://i.ytimg.com/vi/MmZexg8sxyk/mqdefault.jpg' },
  { title:'Dreams', channel:'Fleetwood Mac', duration:254, thumbnail:'https://i.ytimg.com/vi/mrZRURcb1cM/mqdefault.jpg' },
  { title:'Midnight City', channel:'M83', duration:243, thumbnail:'https://i.ytimg.com/vi/dX3k_QDnzHE/mqdefault.jpg' },
];

const SAMPLE_SEARCH = [
  { title:'Midnight City', channel:'M83', duration:243, thumbnail:'https://i.ytimg.com/vi/dX3k_QDnzHE/mqdefault.jpg' },
  { title:'Midnight City (Lyrics)', channel:'Lyric Videos', duration:243, thumbnail:'https://i.ytimg.com/vi/dX3k_QDnzHE/mqdefault.jpg' },
  { title:'M83 - Midnight City (Live)', channel:'M83 Official', duration:318, thumbnail:'https://i.ytimg.com/vi/dX3k_QDnzHE/mqdefault.jpg' },
  { title:'M83 - Reunion (Official Video)', channel:'M83', duration:267, thumbnail:'https://i.ytimg.com/vi/dX3k_QDnzHE/mqdefault.jpg' },
];

const SAMPLE_PLAYLISTS = [
  { id:'1', name:'Late Night Drive', trackCount:24 },
  { id:'2', name:'Focus Mode', trackCount:41 },
  { id:'3', name:'Morning Brew', trackCount:18 },
  { id:'4', name:"Workout '25", trackCount:33 },
];

// ── State ──────────────────────────────────────────────────────────
let queueData = JSON.parse(JSON.stringify(SAMPLE_QUEUE));
let playlists = [...SAMPLE_PLAYLISTS];
let isPlaying = true;
let loopMode = false;
let progressStart = Date.now() - 92000;
let progressDuration = SAMPLE_QUEUE.current.duration;
let progressTimer = null;
let searchTimer = null;
let currentView = 'search';

// ── Boot ───────────────────────────────────────────────────────────
function init() {
  setGreeting();
  renderPlaylistSidebar();
  renderNowPlaying();
  renderQueue();
  syncPlayPauseIcons();
  startProgressTimer();
  showView('search');
}

function setGreeting() {
  const h = new Date().getHours();
  const g = h < 12 ? 'Good morning' : h < 18 ? 'Good afternoon' : 'Good evening';
  document.getElementById('hero-heading').innerHTML = `${g},<br><em>Kasper.</em>`;
}

function logout() { toast('Signed out'); }

// ── Now Playing ────────────────────────────────────────────────────
function renderNowPlaying() {
  const t = queueData.current;
  if (!t) {
    document.getElementById('np-title').textContent = 'Nothing playing';
    document.getElementById('np-artist').textContent = '—';
    document.getElementById('bb-title').textContent = '—';
    document.getElementById('bb-artist').textContent = 'Not playing';
    return;
  }
  document.getElementById('np-title').textContent = t.title;
  document.getElementById('np-artist').textContent = t.channel;
  document.getElementById('bb-title').textContent = t.title;
  document.getElementById('bb-artist').textContent = t.channel;
  setArtwork('np-art-img', 'np-art-placeholder', t.thumbnail);
  setArtwork('bb-art-img', null, t.thumbnail);
  progressDuration = t.duration;
}

function setArtwork(imgId, placeholderId, src) {
  const img = document.getElementById(imgId);
  if (src) {
    img.onload = () => { img.style.opacity='1'; if (placeholderId) document.getElementById(placeholderId).style.display='none'; };
    img.onerror = () => { img.style.opacity='0'; if (placeholderId) document.getElementById(placeholderId).style.display='flex'; };
    img.src = src;
  } else {
    img.style.opacity = '0';
    if (placeholderId) document.getElementById(placeholderId).style.display = 'flex';
  }
}

// ── Progress ───────────────────────────────────────────────────────
function startProgressTimer() {
  clearInterval(progressTimer);
  if (isPlaying) progressTimer = setInterval(updateProgress, 1000);
  updateProgress();
}

function updateProgress() {
  if (!progressDuration) return;
  const elapsed = Math.min((Date.now() - progressStart) / 1000, progressDuration);
  const pct = (elapsed / progressDuration) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('bb-prog-fill').style.width = pct + '%';
  document.getElementById('prog-current').textContent = fmt(elapsed);
  document.getElementById('prog-total').textContent = fmt(progressDuration);
}

function fmt(s) {
  s = Math.max(0, Math.floor(s));
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}

// ── Queue — single source of truth in right panel ──────────────────
function renderQueue() {
  const list = document.getElementById('queue-list');
  const tracks = queueData.tracks || [];
  const current = queueData.current;

  if (!tracks.length && !current) {
    list.innerHTML = `<div class="empty-state" style="padding:20px 10px;font-size:12px;">Queue is empty</div>`;
    return;
  }

  const nowHtml = current ? `
    <div class="q-item now-playing">
      <div class="q-art"><img src="${current.thumbnail}" alt="" loading="lazy"></div>
      <div class="q-info">
        <div class="q-title"><span class="eq"><span class="eq-b"></span><span class="eq-b"></span><span class="eq-b"></span><span class="eq-b"></span></span> ${escHtml(current.title)}</div>
        <div class="q-artist">${escHtml(current.channel)}</div>
      </div>
      <div class="q-dur">${fmt(current.duration)}</div>
      <div style="width:18px;"></div>
    </div>` : '';

  const upHtml = tracks.map((t, i) => `
    <div class="q-item">
      <div class="q-art"><img src="${t.thumbnail}" alt="" loading="lazy"></div>
      <div class="q-info">
        <div class="q-title">${escHtml(t.title)}</div>
        <div class="q-artist">${escHtml(t.channel)}</div>
      </div>
      <div class="q-dur">${fmt(t.duration)}</div>
      <button class="q-remove" onclick="removeFromQueue(${i})" title="Remove">
        <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>`).join('');

  list.innerHTML = nowHtml + upHtml;
}

function removeFromQueue(i) { queueData.tracks.splice(i, 1); renderQueue(); }

function shuffleQueue() {
  queueData.tracks = [...queueData.tracks].sort(() => Math.random() - 0.5);
  renderQueue(); toast('Queue shuffled');
}

function clearQueue() {
  if (!confirm('Clear the queue?')) return;
  queueData.tracks = []; renderQueue(); toast('Queue cleared');
}

function addToQueue(title, thumbnail) {
  queueData.tracks.push({ title, channel:'YouTube', duration:200, thumbnail: thumbnail || 'https://i.ytimg.com/vi/dX3k_QDnzHE/mqdefault.jpg' });
  renderQueue();
  toast(`Added "${title}" to queue`);
}

// ── Player Controls ────────────────────────────────────────────────
function playerAction(action) {
  if (action === 'loop') {
    loopMode = !loopMode;
    document.getElementById('ctrl-loop').classList.toggle('active', loopMode);
    toast(loopMode ? 'Loop on' : 'Loop off');
  } else if (action === 'skip') {
    if (queueData.tracks.length) {
      queueData.current = queueData.tracks.shift();
      progressStart = Date.now();
      renderNowPlaying(); renderQueue(); startProgressTimer();
    } else { toast('Nothing next in queue'); }
  } else if (action === 'stop') {
    isPlaying = false; clearInterval(progressTimer); syncPlayPauseIcons(); toast('Stopped');
  }
}

function togglePlayPause() {
  isPlaying = !isPlaying;
  if (isPlaying) {
    const pct = parseFloat(document.getElementById('progress-fill').style.width) / 100;
    progressStart = Date.now() - (pct * progressDuration * 1000);
    startProgressTimer();
  } else { clearInterval(progressTimer); }
  syncPlayPauseIcons();
}

function syncPlayPauseIcons() {
  ['play-icon','bb-play-icon'].forEach(id => document.getElementById(id).style.display = isPlaying ? 'none' : '');
  ['pause-icon','bb-pause-icon'].forEach(id => document.getElementById(id).style.display = isPlaying ? '' : 'none');
}

// ── Nav / Views ────────────────────────────────────────────────────
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    item.classList.add('active');
    showView(item.dataset.view);
  });
});

function showView(view) {
  currentView = view;
  const inp = document.getElementById('search-input');
  inp.value = '';
  if (view === 'search') {
    document.getElementById('section-title').textContent = 'BROWSE';
    inp.placeholder = 'Search YouTube — type to find any song…';
    renderBrowseDefault();
  } else if (view === 'playlists') {
    document.getElementById('section-title').textContent = 'PLAYLISTS';
    inp.placeholder = 'Search playlists…';
    renderPlaylistGrid();
  } else if (view === 'history') {
    document.getElementById('section-title').textContent = 'PLAY HISTORY';
    inp.placeholder = 'Filter history…';
    renderHistory();
  }
}

function renderBrowseDefault() {
  document.getElementById('center-content').innerHTML = `
    <div class="default-grid">
      <div class="default-card" onclick="toast('Opening liked songs…')">
        <div class="default-card-icon">❤️</div>
        <div><div class="default-card-label">Liked Songs</div><div class="default-card-sub">Your favourites</div></div>
      </div>
      <div class="default-card" onclick="showView('history');document.querySelectorAll('.nav-item').forEach(n=>{n.classList.toggle('active',n.dataset.view==='history')})">
        <div class="default-card-icon">🕐</div>
        <div><div class="default-card-label">Recently Played</div><div class="default-card-sub">${SAMPLE_HISTORY.length} tracks</div></div>
      </div>
      ${playlists.map((pl,i) => `
        <div class="default-card" onclick="toast('Opening ${escHtml(pl.name)}…')">
          <div class="default-card-icon" style="font-size:20px;">🎵</div>
          <div><div class="default-card-label">${escHtml(pl.name)}</div><div class="default-card-sub">${pl.trackCount} songs</div></div>
        </div>`).join('')}
    </div>`;
}

function renderPlaylistGrid() {
  document.getElementById('center-content').innerHTML = `
    <div class="pl-grid">
      <div class="pl-card pl-card-new" onclick="openPlaylistModal()">
        <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <div style="font-size:12px;font-weight:500;">New Playlist</div>
      </div>
      ${playlists.map((pl,i) => `
        <div class="pl-card" onclick="toast('Opening ${escHtml(pl.name)}…')">
          <div class="pl-card-art" style="background:${CHIP_COLORS[i%CHIP_COLORS.length]}18;color:${CHIP_COLORS[i%CHIP_COLORS.length]};">🎵</div>
          <div class="pl-card-name">${escHtml(pl.name)}</div>
          <div class="pl-card-count">${pl.trackCount} songs</div>
        </div>`).join('')}
    </div>`;
}

function renderHistory() {
  document.getElementById('center-content').innerHTML = SAMPLE_HISTORY.map(t => `
    <div class="result-item">
      <div class="result-thumb"><img src="${t.thumbnail}" alt="" loading="lazy"></div>
      <div class="result-info">
        <div class="result-title">${escHtml(t.title)}</div>
        <div class="result-channel">${escHtml(t.channel)}</div>
      </div>
      <div class="result-dur">${fmt(t.duration)}</div>
      <button class="result-add" onclick="addToQueue('${escAttr(t.title)}','${escAttr(t.thumbnail)}')">+ Add</button>
    </div>`).join('');
}

// ── Search ─────────────────────────────────────────────────────────
const searchInput = document.getElementById('search-input');
const searchSpinner = document.getElementById('search-spinner');

searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  const q = searchInput.value.trim();
  if (!q) { showView(currentView); return; }
  searchSpinner.classList.add('active');
  searchTimer = setTimeout(() => {
    searchSpinner.classList.remove('active');
    document.getElementById('section-title').textContent = 'RESULTS';
    document.getElementById('center-content').innerHTML = SAMPLE_SEARCH.map(r => `
      <div class="result-item">
        <div class="result-thumb"><img src="${r.thumbnail}" alt="" loading="lazy"></div>
        <div class="result-info">
          <div class="result-title">${escHtml(r.title)}</div>
          <div class="result-channel">${escHtml(r.channel)}</div>
        </div>
        <div class="result-dur">${fmt(r.duration)}</div>
        <button class="result-add" onclick="addToQueue('${escAttr(r.title)}','${escAttr(r.thumbnail)}')">+ Add</button>
      </div>`).join('');
  }, 400);
});

searchInput.addEventListener('keydown', e => {
  if (e.key === 'Escape') { searchInput.value = ''; showView(currentView); }
});

// ── Playlists ──────────────────────────────────────────────────────
function renderPlaylistSidebar() {
  document.getElementById('playlist-sidebar-list').innerHTML = playlists.map((pl,i) => `
    <div class="pl-sidebar-item" onclick="toast('Opening ${escHtml(pl.name)}…')">
      <div class="pl-thumb" style="background:${CHIP_COLORS[i%CHIP_COLORS.length]}18;">🎵</div>
      <div>
        <div class="pl-name">${escHtml(pl.name)}</div>
        <div class="pl-count">${pl.trackCount} songs</div>
      </div>
    </div>`).join('');
}

// ── Playlist Modal ─────────────────────────────────────────────────
function openPlaylistModal() {
  document.getElementById('playlist-modal').classList.add('open');
  setTimeout(() => document.getElementById('pl-name-input').focus(), 50);
}
function closePlaylistModal() {
  document.getElementById('playlist-modal').classList.remove('open');
  document.getElementById('pl-name-input').value = '';
  document.getElementById('pl-spotify-input').value = '';
}
function createPlaylist() {
  const name = document.getElementById('pl-name-input').value.trim();
  if (!name) { toast('Enter a name', true); return; }
  playlists.push({ id: Date.now().toString(), name, trackCount:0 });
  closePlaylistModal();
  toast(`"${name}" created`);
  renderPlaylistSidebar();
  if (currentView === 'playlists') renderPlaylistGrid();
}
document.getElementById('pl-name-input').addEventListener('keydown', e => { if (e.key === 'Enter') createPlaylist(); });

// ── Utils ──────────────────────────────────────────────────────────
function toast(msg, isError=false) {
  const el = document.createElement('div');
  el.className = `toast${isError?' error':''}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3100);
}
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s) { return String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

init();
</script>
</body>
</html>
